components:
  schemas:
    APIKeyList:
      type: object
      description: List/retrieve view — never exposes the plaintext token.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
          description: Human-readable label (e.g. 'CI server', 'Local dev').
        environment:
          allOf:
          - $ref: '#/components/schemas/EnvironmentEnum'
          readOnly: true
        key_prefix:
          type: string
          readOnly: true
        scopes:
          readOnly: true
          description: Permission strings using the same catalog as JWT tokens (e.g.
            ['catalog:read']).
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        is_active:
          type: boolean
          readOnly: true
      required:
      - created_at
      - environment
      - expires_at
      - id
      - is_active
      - key_prefix
      - last_used_at
      - name
      - revoked_at
      - scopes
    AcquisitionDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        source:
          type: integer
          readOnly: true
        acquired_on:
          type: string
          format: date
        cost_usd:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
        rights:
          $ref: '#/components/schemas/RightsEnum'
        notes:
          type: string
        proof_path:
          type: string
          maxLength: 500
        bonus_data:
          nullable: true
          description: Data supplied by third party providers that we haven't decided
            how or if to use yet.
        external_ids: {}
      required:
      - id
      - source
    AcquisitionList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        source:
          type: integer
          readOnly: true
        acquired_on:
          type: string
          format: date
        rights:
          $ref: '#/components/schemas/RightsEnum'
        cost_usd:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
      required:
      - id
      - source
    AcquisitionWrite:
      type: object
      properties:
        source:
          type: integer
        acquired_on:
          type: string
          format: date
        cost_usd:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          nullable: true
        rights:
          $ref: '#/components/schemas/RightsEnum'
        notes:
