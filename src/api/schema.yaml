  /api/v1/video-assets/:
    get:
      operationId: video_assets_list
      description: |-
        Apply :data:`HOLDINGS_PERMISSIONS` to a viewset.

        See :class:`CatalogPermissionMixin` for usage.
      parameters:
      - in: query
        name: asset_type
        schema:
          type: string
          enum:
          - ALL22
          - COACHES
          - CONDENSED
          - FULL
          - HIGHLIGHTS
          - OTHER
          - RADIO
        description: |-
          * `FULL` - Full Broadcast
          * `CONDENSED` - Condensed
          * `COACHES` - Coaches Film
          * `ALL22` - All-22
          * `HIGHLIGHTS` - Highlights
          * `RADIO` - Radio Audio
          * `OTHER` - Other
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: game
        schema:
          type: integer
      - in: query
        name: is_preferred
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: quality_tier
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - D
        description: |-
          * `A` - Tier A (Best Available)
          * `B` - Tier B (Very Good)
          * `C` - Tier C (Good)
          * `D` - Tier D (Filler)
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - video-assets
      responses:
        '200':
          content:
            application/json:
