openapi: 3.0.3
info:
  title: GAM API
  version: 0.0.0
  description: REST API for the Griddy Archive Manager
paths:
  /api/v1/acquisitions/:
    get:
      operationId: acquisitions_list
      description: |-
        Apply :data:`HOLDINGS_PERMISSIONS` to a viewset.

        See :class:`CatalogPermissionMixin` for usage.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: rights
        schema:
          type: string
          enum:
          - PERSONAL_ONLY
          - SHAREABLE
          - UNKNOWN
        description: |-
          * `PERSONAL_ONLY` - Personal use only
          * `SHAREABLE` - Shareable
          * `UNKNOWN` - Unknown
      - in: query
        name: source
        schema:
          type: integer
      tags:
      - acquisitions
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAcquisitionListList'
          description: ''
    post:
      operationId: acquisitions_create
      description: |-
        Apply :data:`HOLDINGS_PERMISSIONS` to a viewset.

        See :class:`CatalogPermissionMixin` for usage.
      tags:
      - acquisitions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcquisitionWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AcquisitionWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AcquisitionWrite'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisitionWrite'
          description: ''
