  /api/v1/api-keys/:
    get:
      operationId: api_keys_list
      description: |-
        List, issue, and revoke API keys for the requesting account.

        All actions are scoped to the principal's :class:`ClerkAccount`; you
        cannot read or revoke another account's keys, even with admin perms.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api-keys
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKeyList'
          description: ''
    post:
      operationId: api_keys_create
      description: |-
        List, issue, and revoke API keys for the requesting account.

        All actions are scoped to the principal's :class:`ClerkAccount`; you
        cannot read or revoke another account's keys, even with admin perms.
      tags:
      - api-keys
      requestBody:
