      - in: query
        name: has_condensed
        schema:
          type: boolean
      - in: query
        name: has_full
        schema:
          type: boolean
      - in: query
        name: scope
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - COMPLETE
          - COMPLETE_NEEDS_UPGRADE
          - MISSING
          - PARTIAL
        description: |-
          * `MISSING` - Missing
          * `PARTIAL` - Partial
          * `COMPLETE` - Complete
          * `COMPLETE_NEEDS_UPGRADE` - Complete (Needs Upgrade)
